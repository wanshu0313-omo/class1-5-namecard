<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉语姓名发音 · 班级点名板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --red:    #C0392B;
    --red-lt: #FDECEA;
    --red-dk: #922B21;
    --ink:    #1a1a1a;
    --muted:  #6b6b6b;
    --border: #e0dbd5;
    --bg:     #F9F6F0;
    --card:   #FFFFFF;
    --playing-bg:  #FDF0EF;
    --playing-bdr: #C0392B;
    --radius: 10px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--red);
    color: #fff;
    padding: 1.5rem 2rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }
  .header-icon {
    font-family: 'Noto Serif SC', serif;
    font-size: 2rem;
    line-height: 1;
    background: rgba(255,255,255,0.18);
    border-radius: 8px;
    width: 52px; height: 52px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  header p {
    font-size: 0.82rem;
    opacity: 0.85;
    margin-top: 3px;
    letter-spacing: 0.02em;
  }

  /* ── Now playing bar ── */
  #now-playing {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0.9rem 2rem;
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 56px;
    transition: opacity 0.2s;
  }
  #now-playing.idle { opacity: 0.45; }
  .pulse-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
    animation: none;
  }
  #now-playing.active .pulse-dot {
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.5); opacity: 0.5; }
  }
  #now-playing-text {
    font-size: 0.9rem;
    color: var(--muted);
  }
  #now-playing-text strong {
    color: var(--ink);
    font-weight: 500;
  }

  /* ── Grid ── */
  main {
    padding: 1.8rem 2rem 3rem;
    max-width: 960px;
    margin: 0 auto;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }

  /* ── Student button ── */
  .btn-student {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px 14px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s, transform 0.1s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 4px;
    box-shadow: var(--shadow);
  }
  .btn-student:hover {
    border-color: #c0a08a;
    box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    transform: translateY(-1px);
  }
  .btn-student:active {
    transform: translateY(0px) scale(0.98);
    box-shadow: var(--shadow);
  }
  .btn-student.playing {
    background: var(--playing-bg);
    border-color: var(--playing-bdr);
    border-width: 1.5px;
  }
  .btn-student.no-audio {
    opacity: 0.5;
    cursor: default;
  }
  .btn-student.no-audio:hover {
    transform: none;
    border-color: var(--border);
    box-shadow: var(--shadow);
  }

  .seat-num {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--red);
    font-family: 'Noto Sans JP', monospace;
  }
  .student-name {
    font-family: 'Noto Sans JP', 'Noto Sans SC', sans-serif;
    font-size: 1.05rem;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.03em;
    line-height: 1.3;
  }
  .pinyin {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    font-family: 'Noto Sans SC', sans-serif;
  }

  /* speaker icon on hover */
  .btn-student::after {
    content: "▶";
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    font-size: 0.75rem;
    color: var(--red);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .btn-student:not(.no-audio):hover::after { opacity: 0.7; }
  .btn-student.playing::after { opacity: 1; content: "♪"; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 0.78rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }

  @media (max-width: 500px) {
    header { padding: 1rem 1rem; }
    main { padding: 1.2rem 1rem 2.5rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-icon">名</div>
  <div>
    <h1>汉语姓名发音练习</h1>
    <p>点击卡片，收听对应学生姓名的汉语读音</p>
  </div>
</header>

<div id="now-playing" class="idle">
  <div class="pulse-dot"></div>
  <div id="now-playing-text">请点击任意学生卡片播放发音</div>
</div>

<main>
  <div class="grid" id="student-grid"></div>
</main>

<footer>汉语发音点名板 · 录音文件请放置于 <code>audio/</code> 文件夹内，格式：<code>1501.mp3</code></footer>

<audio id="player"></audio>

<script>
// ══════════════════════════════════════════════
//  学生名单 — 请填入每位学生的日文姓名和拼音
//  格式：{ seat: 座席番号, name: "日文氏名", pinyin: "Pīnyīn" }
//  pinyin 可留空：pinyin: ""
// ══════════════════════════════════════════════
const students = [
  { seat: 1501, name: "（未定）", pinyin: "" },
  { seat: 1502, name: "（未定）", pinyin: "" },
  { seat: 1503, name: "（未定）", pinyin: "" },
  { seat: 1504, name: "（未定）", pinyin: "" },
  { seat: 1505, name: "（未定）", pinyin: "" },
  { seat: 1506, name: "（未定）", pinyin: "" },
  { seat: 1507, name: "（未定）", pinyin: "" },
  { seat: 1508, name: "（未定）", pinyin: "" },
  { seat: 1509, name: "（未定）", pinyin: "" },
  { seat: 1510, name: "（未定）", pinyin: "" },
  { seat: 1511, name: "（未定）", pinyin: "" },
  { seat: 1512, name: "（未定）", pinyin: "" },
  { seat: 1513, name: "（未定）", pinyin: "" },
  { seat: 1514, name: "（未定）", pinyin: "" },
  { seat: 1515, name: "（未定）", pinyin: "" },
  { seat: 1516, name: "（未定）", pinyin: "" },
  { seat: 1517, name: "（未定）", pinyin: "" },
  { seat: 1518, name: "（未定）", pinyin: "" },
  { seat: 1519, name: "（未定）", pinyin: "" },
  { seat: 1520, name: "（未定）", pinyin: "" },
  { seat: 1521, name: "（未定）", pinyin: "" },
  { seat: 1522, name: "（未定）", pinyin: "" },
  { seat: 1523, name: "（未定）", pinyin: "" },
  { seat: 1524, name: "（未定）", pinyin: "" },
  { seat: 1525, name: "（未定）", pinyin: "" },
  { seat: 1526, name: "（未定）", pinyin: "" },
  { seat: 1527, name: "（未定）", pinyin: "" },
  { seat: 1528, name: "（未定）", pinyin: "" },
  { seat: 1529, name: "（未定）", pinyin: "" },
  { seat: 1530, name: "（未定）", pinyin: "" },
  { seat: 1531, name: "（未定）", pinyin: "" },
  { seat: 1532, name: "（未定）", pinyin: "" },
  { seat: 1533, name: "（未定）", pinyin: "" },
  { seat: 1534, name: "（未定）", pinyin: "" },
  { seat: 1535, name: "（未定）", pinyin: "" },
  { seat: 1536, name: "（未定）", pinyin: "" },
  { seat: 1537, name: "（未定）", pinyin: "" },
];

// ══════════════════════════════════════════════
//  音声ファイルのパス設定
//  デフォルト: audio/1501.mp3, audio/1502.mp3 ...
//  変更が必要な場合はここを編集
// ══════════════════════════════════════════════
function audioPath(seat) {
  return `audio/${seat}.mp3`;
}

// ── Build UI ──
const grid = document.getElementById('student-grid');
const player = document.getElementById('player');
const nowPlayingBar = document.getElementById('now-playing');
const nowPlayingText = document.getElementById('now-playing-text');
let activeBtn = null;

students.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'btn-student';
  btn.dataset.seat = s.seat;
  btn.innerHTML = `
    <span class="seat-num">${s.seat}</span>
    <span class="student-name">${s.name}</span>
    ${s.pinyin ? `<span class="pinyin">${s.pinyin}</span>` : ''}
  `;
  btn.addEventListener('click', () => playAudio(s, btn));
  grid.appendChild(btn);
});

// ── Playback ──
function playAudio(student, btn) {
  if (btn.classList.contains('no-audio')) return;

  // Same button clicked while playing → stop
  if (activeBtn === btn && !player.paused) {
    player.pause();
    setIdle();
    return;
  }

  if (activeBtn) activeBtn.classList.remove('playing');
  activeBtn = btn;
  btn.classList.add('playing');

  player.src = audioPath(student.seat);
  player.play().catch(() => {
    btn.classList.remove('playing');
    btn.classList.add('no-audio');
    btn.title = '音声ファイルが見つかりません';
    setIdle();
    activeBtn = null;
  });

  nowPlayingBar.classList.remove('idle');
  nowPlayingBar.classList.add('active');
  nowPlayingText.innerHTML = `
    <strong>${student.seat} · ${student.name}</strong>
    ${student.pinyin ? ' — ' + student.pinyin : ''}
    &nbsp;を再生中
  `;
}

player.addEventListener('ended', () => {
  if (activeBtn) activeBtn.classList.remove('playing');
  activeBtn = null;
  setIdle();
});

function setIdle() {
  nowPlayingBar.classList.remove('active');
  nowPlayingBar.classList.add('idle');
  nowPlayingText.textContent = '請点击任意学生カードで発音を再生';
  if (activeBtn) { activeBtn.classList.remove('playing'); activeBtn = null; }
}
</script>
</body>
</html>
